<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正和控股官网 - 直接查看</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 20px;
            background: #003366;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .container {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #003366;
            margin-bottom: 20px;
        }
        
        .logo {
            font-size: 3rem;
            color: #D4AF37;
            margin-bottom: 20px;
        }
        
        .file-box {
            background: #f8f9fa;
            border: 2px dashed #003366;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        
        .file-item {
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-radius: 5px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #dee2e6;
        }
        
        .file-item:hover {
            background: #e7f3ff;
            transform: translateX(5px);
            border-color: #003366;
        }
        
        .file-icon {
            margin-right: 10px;
            color: #003366;
            font-size: 1.2rem;
            width: 30px;
            text-align: center;
        }
        
        .file-name {
            font-weight: bold;
            color: #003366;
        }
        
        .file-desc {
            font-size: 0.9rem;
            color: #666;
            margin-left: 10px;
        }
        
        .path-info {
            background: #003366;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin: 20px 0;
            font-family: monospace;
            word-break: break-all;
            font-size: 0.9rem;
        }
        
        .btn {
            display: inline-block;
            background: #003366;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            margin: 10px;
            font-weight: bold;
            border: 2px solid #003366;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: white;
            color: #003366;
        }
        
        .btn-gold {
            background: #D4AF37;
            border-color: #D4AF37;
            color: #333;
        }
        
        .btn-gold:hover {
            background: white;
            color: #333;
        }
        
        .instructions {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            color: #856404;
        }
        
        .step {
            margin: 10px 0;
            padding-left: 20px;
            position: relative;
        }
        
        .step:before {
            content: "•";
            position: absolute;
            left: 0;
            color: #003366;
            font-weight: bold;
        }
    </style>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-building"></i>
        </div>
        
        <h1>正和控股官网</h1>
        <p>网站已创建完成，请选择要查看的页面：</p>
        
        <div class="file-box">
            <div class="file-item" onclick="openFile('index.html')">
                <div class="file-icon"><i class="fas fa-home"></i></div>
                <div>
                    <div class="file-name">index.html</div>
                    <div class="file-desc">官网首页 - 公司介绍与业务概览</div>
                </div>
            </div>
            
            <div class="file-item" onclick="openFile('business.html')">
                <div class="file-icon"><i class="fas fa-briefcase"></i></div>
                <div>
                    <div class="file-name">business.html</div>
                    <div class="file-desc">业务板块 - 详细业务介绍</div>
                </div>
            </div>
            
            <div class="file-item" onclick="openFile('test-doubao.html')">
                <div class="file-icon"><i class="fas fa-robot"></i></div>
                <div>
                    <div class="file-name">test-doubao.html</div>
                    <div class="file-desc">豆包AI测试 - 验证AI识别功能</div>
                </div>
            </div>
            
            <div class="file-item" onclick="openFile('preview-design.html')">
                <div class="file-icon"><i class="fas fa-palette"></i></div>
                <div>
                    <div class="file-name">preview-design.html</div>
                    <div class="file-desc">设计预览 - 查看设计元素</div>
                </div>
            </div>
        </div>
        
        <div class="instructions">
            <p><strong>如何打开：</strong></p>
            <div class="step">点击上方文件名称</div>
            <div class="step">按照提示操作</div>
            <div class="step">或在文件资源管理器中双击文件</div>
        </div>
        
        <div class="path-info">
            文件位置：C:\Users\13535\.openclaw\workspace\zhengholdings-website\
        </div>
        
        <div>
            <button onclick="showInExplorer()" class="btn">
                <i class="fas fa-folder-open"></i> 打开文件夹
            </button>
            <button onclick="copyPath()" class="btn btn-gold">
                <i class="fas fa-copy"></i> 复制路径
            </button>
        </div>
        
        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #dee2e6; color: #666; font-size: 0.9rem;">
            <p><strong>提示：</strong> 如果点击无效，请手动在文件资源管理器中打开。</p>
            <p>需要帮助？告诉我具体问题。</p>
        </div>
    </div>
    
    <script>
        function openFile(filename) {
            // 构建文件路径
            const path = `C:\\Users\\13535\\.openclaw\\workspace\\zhengholdings-website\\${filename}`;
            const fileUrl = `file:///C:/Users/13535/.openclaw/workspace/zhengholdings-website/${filename}`;
            
            // 显示提示
            const message = `请执行以下操作之一：\n\n` +
                          `1. 在文件资源管理器中打开：\n${path}\n\n` +
                          `2. 或在浏览器地址栏输入：\n${fileUrl}\n\n` +
                          `3. 或直接双击文件夹中的 ${filename} 文件`;
            
            alert(message);
            
            // 尝试复制路径到剪贴板
            try {
                navigator.clipboard.writeText(path);
                console.log('路径已复制到剪贴板');
            } catch (err) {
                console.log('复制失败');
            }
        }
        
        function showInExplorer() {
            const path = "C:\\Users\\13535\\.openclaw\\workspace\\zhengholdings-website\\";
            alert(`请打开文件资源管理器，粘贴以下路径：\n\n${path}`);
            
            // 复制路径到剪贴板
            navigator.clipboard.writeText(path).then(() => {
                console.log('路径已复制');
            });
        }
        
        function copyPath() {
            const path = "C:\\Users\\13535\\.openclaw\\workspace\\zhengholdings-website\\";
            navigator.clipboard.writeText(path).then(() => {
                alert('文件夹路径已复制到剪贴板！\n\n现在可以粘贴到文件资源管理器地址栏。');
            });
        }
        
        // 添加键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === '1') openFile('index.html');
            if (e.key === '2') openFile('business.html');
            if (e.key === '3') openFile('test-doubao.html');
            if (e.key === '4') openFile('preview-design.html');
        });
        
        // 页面加载提示
        window.addEventListener('load', () => {
            console.log('正和控股官网查看页面已加载');
            console.log('按数字键 1-4 快速选择文件');
        });
    </script>
</body>
</html>
